services:
  db:
    image: postgres:15-alpine
    container_name: task_manager_db
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: apple
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apple -d cms"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: task_manager_api
    env_file: .env
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: task_manager_ui
    env_file: .env
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: